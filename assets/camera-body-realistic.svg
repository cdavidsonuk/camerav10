  <circle cx="1221" cy="132" r="31" fill="url(#button)" stroke="#92999e" stroke-width="5"/>
  <rect x="1285" y="103" width="82" height="52" rx="21" fill="#0a0c0e" stroke="#555d63" stroke-width="4"/>
  <path d="M1293 110 h66 M1293 122 h66 M1293 134 h66 M1293 146 h66" stroke="#555d63" stroke-width="3"/>

