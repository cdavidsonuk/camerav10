  <text x="328" y="145" fill="#fff" font-size="22" font-family="Arial">M</text>
  <text x="382" y="172" fill="#fff" font-size="22" font-family="Arial">A</text>
  <text x="397" y="226" fill="#fff" font-size="22" font-family="Arial">S</text>
  <text x="369" y="276" fill="#fff" font-size="22" font-family="Arial">P</text>
  <text x="283" y="273" fill="#fff" font-size="18" font-family="Arial">AUTO</text>
