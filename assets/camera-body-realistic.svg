  <path d="M574 147 L634 53 H955 L1016 147 L984 245 H605 Z" fill="url(#panel)" stroke="#596168" stroke-width="6"/>
  <path d="M613 134 L653 78 H937 L977 134" fill="none" stroke="#fff" stroke-opacity=".09" stroke-width="9"/>

  <!-- hotshoe -->
  <rect x="694" y="35" width="205" height="62" rx="9" fill="#0a0c0e" stroke="#879096" stroke-width="5"/>
  <rect x="717" y="13" width="160" height="43" rx="6" fill="#4c5358" stroke="#b5bcc1" stroke-width="5"/>
  <rect x="742" y="21" width="110" height="25" rx="3" fill="#07090a"/>
