  <circle cx="337" cy="209" r="77" fill="none" stroke="#2b3034" stroke-width="20" stroke-dasharray="5 8"/>
  <circle cx="337" cy="209" r="57" fill="url(#wheel)" stroke="#858c91" stroke-width="5"/>
