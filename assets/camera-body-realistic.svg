  <!-- top LCD -->
  <rect x="1062" y="156" width="260" height="108" rx="15" fill="#0b0d0f" stroke="#596168" stroke-width="6"/>
  <rect x="1078" y="172" width="228" height="77" rx="8" fill="url(#lcd)" stroke="#55624c" stroke-width="4"/>
  <text x="1092" y="201" fill="#1c281b" font-size="22" font-family="monospace">M</text>
  <text x="1134" y="205" fill="#1c281b" font-size="31" font-family="monospace">1/125</text>
  <text x="1235" y="205" fill="#1c281b" font-size="31" font-family="monospace">5.6</text>
  <text x="1190" y="236" fill="#1c281b" font-size="21" font-family="monospace">ISO 100</text>
  <path d="M1094 228 H1169" stroke="#1c281b" stroke-width="3"/>

  <!-- left controls -->
  <g>
    <circle cx="318" cy="420" r="44" fill="url(#button)" stroke="#727a80" stroke-width="4"/>
