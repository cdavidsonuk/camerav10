<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980">
<defs>
  <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#52585d"/>
    <stop offset=".06" stop-color="#2c3135"/>
    <stop offset=".18" stop-color="#14181b"/>
    <stop offset=".62" stop-color="#080a0c"/>
    <stop offset="1" stop-color="#020304"/>
  </linearGradient>
  <linearGradient id="bevel" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#8b9298"/>
    <stop offset=".08" stop-color="#343a3f"/>
    <stop offset=".35" stop-color="#121518"/>
    <stop offset="1" stop-color="#030405"/>
  </linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#2d3236"/>
    <stop offset=".4" stop-color="#111417"/>
    <stop offset="1" stop-color="#050607"/>
  </linearGradient>
  <radialGradient id="button" cx=".32" cy=".23" r=".82">
    <stop offset="0" stop-color="#a0a6ab"/>
    <stop offset=".18" stop-color="#50565b"/>
    <stop offset=".47" stop-color="#202428"/>
    <stop offset="1" stop-color="#050607"/>
  </radialGradient>
  <radialGradient id="wheel" cx=".35" cy=".25" r=".8">
    <stop offset="0" stop-color="#3c4246"/>
    <stop offset=".55" stop-color="#111417"/>
    <stop offset="1" stop-color="#030405"/>
  </radialGradient>
  <linearGradient id="lcd" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#d4e3b9"/>
    <stop offset="1" stop-color="#9bb27d"/>
  </linearGradient>
  <pattern id="rubber" width="12" height="12" patternUnits="userSpaceOnUse">
    <rect width="12" height="12" fill="#131619"/>
    <circle cx="3" cy="3" r="1.8" fill="#3c4145"/>
    <circle cx="9" cy="8" r="2.1" fill="#090b0d"/>
    <path d="M0 11L11 0M6 12L12 6" stroke="#24282c" stroke-width=".8" opacity=".65"/>
  </pattern>
  <pattern id="fine" width="5" height="5" patternUnits="userSpaceOnUse">
    <circle cx="1.5" cy="1.5" r=".7" fill="#41464a"/>
    <circle cx="4" cy="4" r=".7" fill="#090b0c"/>
  </pattern>
  <filter id="shadow" x="-30%" y="-30%" width="170%" height="180%">
    <feDropShadow dx="0" dy="30" stdDeviation="22" flood-color="#000" flood-opacity=".85"/>
  </filter>
  <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feOffset dx="0" dy="5"/>
    <feGaussianBlur stdDeviation="7" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="out" result="inverse"/>
    <feFlood flood-color="#000" flood-opacity=".75"/>
    <feComposite in2="inverse" operator="in"/>
    <feComposite in="SourceGraphic"/>
  </filter>
</defs>

<g filter="url(#shadow)">
  <!-- main chassis -->
  <path d="M208 235 Q222 132 338 118 L545 104 Q591 38 665 30 H923 Q997 38 1043 104 L1245 121 Q1350 136 1370 245 L1410 777 Q1418 888 1311 922 H250 Q143 897 153 785 Z"
