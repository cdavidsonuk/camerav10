  <rect x="309" y="279" width="30" height="62" rx="14" fill="#c5cacf" stroke="#23272a" stroke-width="5"/>
  <text x="213" y="357" fill="#f0f2f3" font-size="22" font-family="Arial">OFF</text>
  <text x="370" y="357" fill="#f0f2f3" font-size="22" font-family="Arial">ON</text>

  <!-- seams -->
  <path d="M170 376 H463 M1137 319 H1378 M1127 451 H1390" fill="none" stroke="#fff" stroke-opacity=".06" stroke-width="3"/>
  <path d="M210 756 H410 M1112 758 H1392" fill="none" stroke="#000" stroke-opacity=".8" stroke-width="4"/>

  <!-- screws -->
  <g fill="#22272a" stroke="#8c9499" stroke-width="3">
    <circle cx="224" cy="245" r="11"/><circle cx="1373" cy="260" r="11"/>
    <circle cx="238" cy="839" r="11"/><circle cx="1351" cy="842" r="11"/>
    <circle cx="414" cy="335" r="9"/><circle cx="1134" cy="343" r="9"/>
  </g>
  <g stroke="#050607" stroke-width="3">
    <path d="M217 245h14M224 238v14M1366 260h14M1373 253v14M231 839h14M238 832v14M1344 842h14M1351 835v14"/>
    <path d="M408 335h12M414 329v12M1128 343h12M1134 337v12"/>
  </g>

  <!-- branding -->
  <text x="667" y="909" fill="#899198" font-size="28" font-weight="700" font-family="Arial">PHOTOGRAPHYCOURSES PRO</text>
