  <path d="M224 240 Q242 158 342 145 L558 133 Q610 71 674 67 H913 Q979 71 1030 133 L1232 150 Q1317 161 1334 251"
        fill="none" stroke="#b9c0c5" stroke-opacity=".17" stroke-width="12" stroke-linecap="round"/>
  <path d="M164 770 Q157 895 267 917 H1293 Q1407 902 1407 781" fill="none" stroke="#000" stroke-opacity=".65" stroke-width="22"/>

  <!-- left shoulder -->
  <path d="M194 256 Q205 162 335 143 L475 133 L466 327 L178 340 Z" fill="url(#panel)" stroke="#454c51" stroke-width="4"/>
  <path d="M204 258 Q217 183 330 165" fill="none" stroke="#fff" stroke-opacity=".08" stroke-width="8"/>

