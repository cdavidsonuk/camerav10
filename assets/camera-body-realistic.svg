  <rect x="630" y="228" width="330" height="151" rx="26" fill="#080a0c" stroke="#2e3438" stroke-width="17"/>
  <rect x="679" y="258" width="233" height="92" rx="13" fill="#010102" stroke="#14181b" stroke-width="6"/>
  <ellipse cx="748" cy="303" rx="38" ry="26" fill="#32185e" opacity=".65"/>
  <ellipse cx="843" cy="303" rx="38" ry="26" fill="#6c1830" opacity=".58"/>
  <path d="M646 237 Q789 205 946 238" fill="none" stroke="#fff" stroke-opacity=".08" stroke-width="7"/>

  <!-- LCD bezel -->
  <rect x="424" y="447" width="700" height="395" rx="30" fill="#050607" stroke="#5c646a" stroke-width="10"/>
